name: "🐞 Bug report"
description: Something in Resume Engine Pro is broken or not working as expected.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! The more detail you give, the faster it can be fixed.
        Your résumé data lives in **your own** GitHub — please don't paste any private personal data here.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I clicked "Generate", the page showed a blank screen and nothing downloaded.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we make it happen again?
      placeholder: |
        1. Sign in with GitHub
        2. Create a profile
        3. Paste a job link and click Generate
        4. See the error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: A tailored résumé should have been generated and offered as a download.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Which part of the app?
      options:
        - Sign in / GitHub token
        - Profiles
        - Generate résumé
        - AI engine / provider
        - Portfolio publishing
        - Applications tracker
        - Settings
        - Landing page
        - Other / not sure
    validations:
      required: false
  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: Chrome 126 on Windows 11
    validations:
      required: false
  - type: textarea
    id: console
    attributes:
      label: Console errors (optional)
      description: Open DevTools (F12) → Console, and paste any red errors here.
      render: shell
    validations:
      required: false
